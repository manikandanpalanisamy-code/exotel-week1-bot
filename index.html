<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Week 1 Assessment Bot — Exotel AI-Tech Support</title>
<style>
  :root { color-scheme: light; --brand: #1a56db; --brand-dark: #1240a8; --bg: #f0f4ff; --bot-bubble: #f1f5f9; --border: #e2e8f0; --text: #1e293b; --muted: #64748b; --success: #059669; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; }

  .top-bar { background: var(--brand); color: white; padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .bot-avatar { width: 38px; height: 38px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .top-bar-info h1 { font-size: 15px; font-weight: 700; }
  .top-bar-info p { font-size: 12px; opacity: 0.8; margin-top: 1px; }
  .progress-pill { margin-left: auto; background: rgba(255,255,255,0.2); border-radius: 20px; padding: 5px 14px; font-size: 12px; font-weight: 600; white-space: nowrap; }

  .chat-window { flex: 1; overflow-y: auto; padding: 20px 16px 8px; display: flex; flex-direction: column; gap: 12px; max-width: 800px; width: 100%; margin: 0 auto; }

  .msg { display: flex; gap: 10px; max-width: 88%; }
  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 15px; background: var(--brand); color: white; margin-top: 2px; }
  .msg.user .msg-avatar { background: #94a3b8; }

  .bubble { padding: 11px 15px; border-radius: 18px; font-size: 14px; line-height: 1.65; }
  .msg.bot .bubble { background: var(--bot-bubble); border-bottom-left-radius: 4px; }
  .msg.user .bubble { background: var(--brand); border-bottom-right-radius: 4px; color: white; }
  .bubble strong { font-weight: 700; }
  .q-label { font-size: 11px; font-weight: 700; color: var(--brand); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 6px; }

  .typing { display: flex; gap: 5px; align-items: center; padding: 12px 15px; }
  .typing span { width: 7px; height: 7px; background: #94a3b8; border-radius: 50%; animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-7px)} }

  .input-wrap { background: white; border-top: 1px solid var(--border); padding: 12px 16px; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
  .input-inner { max-width: 800px; width: 100%; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; }
  textarea#inp { flex: 1; border: 1.5px solid var(--border); border-radius: 14px; padding: 10px 14px; font-size: 14px; font-family: inherit; resize: none; min-height: 44px; max-height: 130px; color: var(--text); transition: border-color 0.2s; line-height: 1.5; }
  textarea#inp:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(26,86,219,0.08); }
  textarea#inp:disabled { background: #f8fafc; color: #adb5bd; }
  .send-btn { width: 44px; height: 44px; background: var(--brand); border: none; border-radius: 50%; color: white; font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s, transform 0.1s; }
  .send-btn:hover:not(:disabled) { background: var(--brand-dark); }
  .send-btn:active:not(:disabled) { transform: scale(0.92); }
  .send-btn:disabled { background: #cbd5e1; cursor: not-allowed; }

  .done-card { background: #ecfdf5; border: 1px solid #6ee7b7; border-radius: 14px; padding: 16px 18px; }
  .done-card .title { font-weight: 700; color: var(--success); font-size: 15px; margin-bottom: 6px; }
  .done-card .sub { font-size: 13px; color: #065f46; line-height: 1.6; }

  .hint { font-size: 12px; color: var(--muted); text-align: center; padding: 6px 0 2px; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="bot-avatar">🤖</div>
  <div class="top-bar-info">
    <h1>Week 1 Assessment Bot</h1>
    <p>AI-Tech Support · Exotel</p>
  </div>
  <div class="progress-pill" id="pill">Not started</div>
</div>

<div class="chat-window" id="chat"></div>

<div class="input-wrap">
  <div class="input-inner">
    <textarea id="inp" placeholder="Type your answer…" disabled
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
      oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,130)+'px'"></textarea>
    <button class="send-btn" id="btn" onclick="send()" disabled>➤</button>
  </div>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const APPS_SCRIPT_URL = "https://script.google.com/a/macros/exotel.com/s/AKfycbxUmyQGjZM68yUxwjDiBZNL2wcuzHTyyPYseIe6KdBNV-LfnL2hrkf3BOEoDTVieXCI/exec";
const NUM_QUESTIONS = 8;

// ── Question Bank ───────────────────────────────────────────────────────────
const QUESTIONS = [
  { section: "Day 1 · Team Structure", q: "A customer calls saying their bot stopped working. L1 picks up the ticket, checks the standard runbook steps, and cannot resolve it. What happens next? Who takes over, what does L1 need to hand over, and why does that information matter?" },
  { section: "Day 1 · Priority Levels", q: "Your teammate classifies a ticket as P2. The customer's bot is partially broken — some users are affected but the main service is still running and there is a workaround. You think it might be P1. How do you decide who is right? What is the key question you ask yourself?" },
  { section: "Day 1 · Tools — SFDC vs Jira", q: "Explain the difference between SFDC Lightning and Jira to someone starting their first day. When does a ticket go into each system, and is there any situation where the same issue appears in both? Give a simple example." },
  { section: "Day 2 · SLA Basics", q: "It is 9am on Monday. A P1 ticket just came in. In plain words — not just numbers — what does 'first response' mean, when must it happen, and what do you do if you are still investigating when that deadline arrives?" },
  { section: "Day 2 · Ticket Lifecycle", q: "Walk me through the life of a ticket from the moment a customer raises it to the moment it is closed. At each stage, what is happening and who is responsible? You do not need exact step names — just show me you understand the flow." },
  { section: "Day 3 · Products in Plain Words", q: "A friend who does not work in tech asks you what your company's product does. Describe all four Exotel products — Chatbot, LiveChat, Campaign, and Cobrowse — in one sentence each. No technical terms. Pretend you are explaining to someone outside the industry." },
  { section: "Day 3 · Product Identification", q: "A customer says: 'Users are sending messages to the bot but agents are not receiving them for a live conversation.' Which product is involved, and how can you tell from the symptom alone? What is the first thing you would check?" },
  { section: "Day 3 · How Products Work Together", q: "Describe a customer journey where all four products are involved at different points. Start from a user opening a chat and end with an agent sharing the user's screen. What triggers each product to activate?" },
  { section: "Day 4 · Console Navigation", q: "A ticket says the bot works on the website but not on WhatsApp. You open the Remote Console. Where do you go first to understand why — walk me through the navigation path and what you are looking for when you get there." },
  { section: "Day 4–5 · Observation", q: "On Day 5 you observed a real production bot in the Remote Console. Describe one thing that stood out — something you did not expect, or that was different from a sandbox bot. Why do you think it is set up that way?" }
];

// ── State ───────────────────────────────────────────────────────────────────
let stage = "name"; // name | email | quiz | done
let name = "", email = "";
let picked = [], curQ = 0, answers = [];

// ── Boot ────────────────────────────────────────────────────────────────────
window.onload = () => setTimeout(() => {
  bot("👋 Hi! I'm the <strong>Week 1 Assessment Bot</strong> for Exotel AI-Tech Support.<br><br>I'll ask you <strong>" + NUM_QUESTIONS + " questions</strong> from Days 1–5, one at a time. Answer in your own words — no notes needed.<br><br>What's your <strong>full name</strong>?");
  enable("e.g. Priya Sharma");
}, 400);

// ── Core send ───────────────────────────────────────────────────────────────
async function send() {
  const el = document.getElementById("inp");
  const txt = el.value.trim();
  if (!txt) return;
  disable();
  userMsg(txt);

  if (stage === "name") {
    name = txt;
    stage = "email";
    await wait(400);
    bot(`Nice to meet you, <strong>${esc(name)}</strong>! What's your <strong>work email</strong>?`);
    enable("you@exotel.com");

  } else if (stage === "email") {
    if (!txt.includes("@")) {
      bot("That doesn't look like a valid email — try again.");
      enable("you@exotel.com");
      return;
    }
    email = txt;
    stage = "quiz";
    picked = shuffle([...QUESTIONS]).slice(0, NUM_QUESTIONS);
    curQ = 0; answers = [];
    setPill("Starting…");
    await wait(500);
    bot(`Let's go! I'll ask you ${NUM_QUESTIONS} questions drawn from across Days 1–5.`);
    await wait(400);
    nextQ();

  } else if (stage === "quiz") {
    answers.push({ section: picked[curQ - 1].section, question: picked[curQ - 1].q, answer: txt });
    if (curQ < NUM_QUESTIONS) {
      await wait(250);
      nextQ();
    } else {
      stage = "done";
      setPill("✅ Done");
      await wait(300);
      await save();
    }
  }
}

function nextQ() {
  curQ++;
  setPill(`Question ${curQ} of ${NUM_QUESTIONS}`);
  const q = picked[curQ - 1];
  bot(`<span class="q-label">Q${curQ} of ${NUM_QUESTIONS} · ${q.section}</span>${esc(q.q)}`);
  enable("Type your answer… (Shift+Enter for new line)");
}

// ── Save via Apps Script ────────────────────────────────────────────────────
async function save() {
  bot("All done! Saving your answers… ⏳");
  const payload = {
    timestamp: new Date().toISOString(),
    name, email, week: "Week 1",
    answers: answers.map(a => ({ section: a.section, question: a.question, answer: a.answer }))
  };
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });
    bot(`<div class="done-card"><div class="title">✅ Assessment saved!</div><div class="sub">Your answers have been recorded in the team Google Sheet.<br><br>Let your buddy know it's ready — they'll review before Day 6.</div></div>`);
  } catch (e) {
    bot(`Hmm, couldn't save automatically. Please copy your answers and send them to your buddy.<br><small style="color:var(--muted)">${e.message}</small>`);
  }
}

// ── UI helpers ──────────────────────────────────────────────────────────────
function bot(html) {
  const win = document.getElementById("chat");
  const d = document.createElement("div");
  d.className = "msg bot";
  d.innerHTML = `<div class="msg-avatar">🤖</div><div class="bubble">${html}</div>`;
  win.appendChild(d);
  win.scrollTop = win.scrollHeight;
}
function userMsg(txt) {
  const win = document.getElementById("chat");
  const d = document.createElement("div");
  d.className = "msg user";
  d.innerHTML = `<div class="msg-avatar">👤</div><div class="bubble">${esc(txt)}</div>`;
  win.appendChild(d);
  win.scrollTop = win.scrollHeight;
}
function enable(ph) {
  const el = document.getElementById("inp");
  el.disabled = false; el.placeholder = ph || "Type…";
  el.value = ""; el.style.height = "auto";
  document.getElementById("btn").disabled = false;
  setTimeout(() => el.focus(), 80);
}
function disable() {
  document.getElementById("inp").disabled = true;
  document.getElementById("btn").disabled = true;
}
function setPill(t) { document.getElementById("pill").textContent = t; }
function esc(t) { return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function wait(ms) { return new Promise(r => setTimeout(r, ms)); }
function shuffle(a) { for (let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a; }
</script>
</body>
</html>
